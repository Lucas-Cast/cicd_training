name: API js docker build

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    working-directory: APIs para exercícios/api-js

jobs:
  docker-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "APIs para exercícios/api-js/Dockerfile"
  docker-build:
    runs-on: ubuntu-latest
    needs: docker-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: "APIs para exercícios/api-js"
          push: false
          tags: api-js:latest
