name: API-GO PIPELINE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'APIs para exercícios/api-go/**'

defaults:
  run:
    working-directory: APIs para exercícios/api-go

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: go build -o main .

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

  sast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec
        run: gosec ./...

  sonar:
    runs-on: ubuntu-latest
    needs: sast
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          projectBaseDir: APIs para exercícios/api-go
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_GO }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  tests:
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./... -v

  docker-lint:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: "APIs para exercícios/api-go/Dockerfile"

  docker-build:
    runs-on: ubuntu-latest
    needs: docker-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: "APIs para exercícios/api-go"
          push: false
          tags: api-go:latest

  hml-deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Deploy to HML
        run: echo "Deploying to HML..."

  prod-deploy:
    runs-on: ubuntu-latest
    needs: hml-deploy
    environment: production
    steps:
      - name: Deploy to Production
        run: echo "Deploying to production..."
